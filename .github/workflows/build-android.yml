name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Install dependencies
        working-directory: SekerMetre
        run: npm ci

      - name: 🔨 Setup Expo
        working-directory: SekerMetre
        run: npm install -g expo-cli eas-cli

      - name: 🏗️ Prebuild Android
        working-directory: SekerMetre
        run: npx expo prebuild --platform android --clean

      - name: 🎯 Build Android APK
        working-directory: SekerMetre/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
          
      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: seker-metre-release
          path: SekerMetre/android/app/build/outputs/apk/release/app-release.apk
          
      - name: 🎉 Build Success
        run: echo "✅ APK başarıyla oluşturuldu!"
